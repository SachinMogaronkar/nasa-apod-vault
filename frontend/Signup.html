<!DOCTYPE html>
<html>
<head>
  <title>ShivaMai | NASA APOD Vault</title>
  <link rel="icon" type="image/png" href="assets/images/trident.png">
  <link rel="stylesheet" href="signup.css" />
</head>

<body>
<div class="homepage">

  <video id="background-video" autoplay loop muted>
    <source src="assets/videos/space.mp4" type="video/mp4" />
  </video>

  <div class="signin-container">
    <div id="signin-form">
      <img class="shivamai-logo" src="assets/images/logo.png" alt="ShivaMai">
      <h2 style="color:white;">Signup</h2>

      <input id="username" type="text" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />

      <button onclick="signup()">Signup</button>

      <p class="switch-auth">
        Already have an account?
        <a href="index.html">Login</a>
      </p>

    </div>
  </div>

</div>

<script>
async function signup() {

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();

  if (!username || !password) {
    alert("Fill all fields");
    return;
  }

  try {

    const API_BASE =
    window.location.hostname === "localhost"
        ? "http://localhost:5000"
        : "https://nasa-apod-vault.onrender.com";

    const res = await fetch(`${API_BASE}/api/auth/register`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    const text = await res.text();

    console.log("STATUS:", res.status);
    console.log("RESPONSE:", text);

    if (!res.ok) {
      alert(text);
      return;
    }

    alert("Signup successful");
    window.location.href = "index.html";

  } catch (e) {
    console.error(e);
    alert("Network or server error");
  }
}
</script>
  <div class="powered-by">
      <img src="assets/images/trident.png" alt="ShivaMai">
      <span>Powered by ShivaMai Projects</span>
  </div>

</body>
</html>
