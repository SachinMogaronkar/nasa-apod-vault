<!DOCTYPE html>
<html>
<head>
  <link rel="icon" type="image/png" href="assets/images/trident.png">
  <title>ShivaMai | Login</title>
  <link rel="stylesheet" href="login.css" />
</head>

<body>
<div class="homepage">

  <video id="background-video" autoplay loop muted>
    <source src="assets/videos/space.mp4" type="video/mp4" />
  </video>

  <div class="login-container">
    <div id="login-form">
      <img class="shivamai-logo" src="assets/images/logo.png" alt="ShivaMai">
      <h2 style="color:white;">Login</h2>

      <input id="username" type="text" placeholder="Username" />
      <input id="password" type="password" placeholder="Password" />

      <button onclick="login()">Login</button>

      <p class="switch-auth">
        Don't have an account?
        <a href="./signup.html">Signup</a>
      </p>

    </div>
  </div>

</div>

<script>

const API_BASE =
  window.location.hostname === "localhost"
    ? "http://localhost:5000"
    : "https://nasa-apod-vault.onrender.com";

async function login() {

  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const btn = document.querySelector("button");

  if (!username || !password) {
    alert("Enter username & password");
    return;
  }

  btn.innerText = "Logging in...";
  btn.disabled = true;

  try {

    const res = await fetch(`${API_BASE}/api/auth/login`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ username, password })
    });

    if (!res.ok) throw new Error();

    const data = await res.json();

    localStorage.setItem("token", data.token);
    localStorage.setItem("username", data.username);

    window.location.href = "./homepage.html";

  } catch (e) {

    console.error(e);
    alert("Invalid credentials");

  }

  btn.innerText = "Login";
  btn.disabled = false;
}

</script>
<div class="powered-by">
    <img src="assets/images/trident.png" alt="ShivaMai">
    <span>Powered by ShivaMai Projects</span>
</div>

</body>
</html>
